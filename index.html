<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Little Fish Co — Recipe Costing</title>
<link href="https://fonts.googleapis.com/css2?family=Raleway:wght@300;400;500;600;700;800&family=Lato:wght@300;400;700&display=swap" rel="stylesheet"/>
<style>
/* ── Reset ─────────────────────────────────────────────────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

/* ── Brand tokens (Little Fish Co palette: black/white/warm-cream/teal) ─ */
:root{
  --black:#111111;
  --off-black:#1e1e1e;
  --charcoal:#2d2d2d;
  --mid:#6b6b6b;
  --light:#9a9a9a;
  --rule:#d8d2c8;
  --faint:#ece7df;
  --cream:#f5f0e8;
  --paper:#faf8f4;
  --white:#ffffff;
  --teal:#2a7e72;       /* accent from LFC seafood brand */
  --teal-dark:#1e6058;
  --teal-light:#e6f4f2;
  --warm:#c8832a;       /* amber/gold warm accent */
  --green:#2a6e44;
  --red:#9e2a2a;
  --amber:#b87010;
  --ff-head:'Raleway',sans-serif;
  --ff-body:'Lato',sans-serif;
}

/* ── Base ───────────────────────────────────────────────────────────────── */
body{font-family:var(--ff-body);background:var(--cream);color:var(--black);font-size:14px;line-height:1.5}

/* ── App Shell ──────────────────────────────────────────────────────────── */
.app{display:grid;grid-template-columns:270px 1fr;min-height:100vh}

/* ═══════════════════════════════════════════════════════════════════════════
   SIDEBAR
═══════════════════════════════════════════════════════════════════════════ */
.sidebar{
  background:var(--black);
  color:var(--white);
  display:flex;flex-direction:column;
  position:sticky;top:0;height:100vh;
  overflow:hidden;
}

.sb-brand{
  padding:1.5rem 1.25rem 1rem;
  border-bottom:1px solid rgba(255,255,255,.08);
  display:flex;flex-direction:column;align-items:center;gap:.5rem;
}
.sb-brand img{
  width:100px;height:100px;
  object-fit:contain;
  display:block;
  /* Logo has transparent bg + dark pixels — invert to white on dark sidebar */
  filter:invert(1);
}
.sb-brand-label{
  font-family:var(--ff-head);
  font-size:.6rem;
  font-weight:700;
  letter-spacing:.25em;
  text-transform:uppercase;
  color:rgba(255,255,255,.35);
}

.sb-new{
  margin:.85rem 1rem .5rem;
  display:block;
  background:var(--teal);
  color:var(--white);
  border:none;
  padding:.65rem 1rem;
  border-radius:2px;
  font-family:var(--ff-head);
  font-weight:700;
  font-size:.72rem;
  letter-spacing:.12em;
  text-transform:uppercase;
  cursor:pointer;
  transition:background .2s;
  width:calc(100% - 2rem);
}
.sb-new:hover{background:var(--teal-dark)}

.sb-label{
  padding:.75rem 1.25rem .2rem;
  font-family:var(--ff-head);
  font-size:.58rem;
  letter-spacing:.2em;
  text-transform:uppercase;
  color:rgba(255,255,255,.3);
  border-top:1px solid rgba(255,255,255,.05);
}

.sb-list{flex:1;overflow-y:auto;padding:.25rem 0 1rem}
.sb-list::-webkit-scrollbar{width:3px}
.sb-list::-webkit-scrollbar-thumb{background:rgba(255,255,255,.12);border-radius:2px}

.sb-item{
  padding:.6rem 1.25rem;
  cursor:pointer;
  border-left:3px solid transparent;
  transition:all .15s;
}
.sb-item:hover{background:rgba(255,255,255,.05)}
.sb-item.active{
  background:rgba(255,255,255,.08);
  border-left-color:var(--teal);
}
.sb-item-name{
  font-family:var(--ff-head);
  font-size:.8rem;
  font-weight:600;
  letter-spacing:.03em;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.sb-item-meta{font-size:.68rem;color:rgba(255,255,255,.35);margin-top:1px}

.sb-footer{
  padding:.85rem 1rem;
  border-top:1px solid rgba(255,255,255,.08);
}
.sb-mgmt{
  width:100%;background:rgba(255,255,255,.06);
  color:rgba(255,255,255,.5);
  border:1px solid rgba(255,255,255,.1);
  padding:.5rem;
  border-radius:2px;
  font-family:var(--ff-body);
  font-size:.75rem;
  cursor:pointer;
  transition:all .15s;
  letter-spacing:.04em;
}
.sb-mgmt:hover{background:rgba(255,255,255,.12);color:var(--white)}

/* ═══════════════════════════════════════════════════════════════════════════
   TOPBAR
═══════════════════════════════════════════════════════════════════════════ */
.main{display:flex;flex-direction:column;min-height:100vh;overflow:hidden}

.topbar{
  background:var(--white);
  border-bottom:2px solid var(--black);
  padding:.75rem 1.5rem;
  display:flex;align-items:center;gap:.75rem;
  position:sticky;top:0;z-index:20;
}
.topbar-title{
  font-family:var(--ff-head);
  font-size:1rem;
  font-weight:800;
  letter-spacing:.1em;
  text-transform:uppercase;
  flex:1;
}

/* ── Buttons ─────────────────────────────────────────────────────────────── */
.btn{
  padding:.45rem 1.1rem;
  border-radius:2px;
  font-family:var(--ff-head);
  font-size:.68rem;
  font-weight:700;
  letter-spacing:.1em;
  text-transform:uppercase;
  cursor:pointer;
  border:none;
  transition:all .15s;
  white-space:nowrap;
}
.btn-solid{background:var(--black);color:var(--white)}.btn-solid:hover{background:var(--charcoal)}
.btn-teal{background:var(--teal);color:var(--white)}.btn-teal:hover{background:var(--teal-dark)}
.btn-ghost{background:transparent;color:var(--mid);border:1.5px solid var(--rule)}.btn-ghost:hover{border-color:var(--black);color:var(--black)}
.btn-danger{background:transparent;color:var(--red);border:1.5px solid var(--rule)}.btn-danger:hover{border-color:var(--red)}

/* ═══════════════════════════════════════════════════════════════════════════
   CONTENT
═══════════════════════════════════════════════════════════════════════════ */
.content{flex:1;overflow-y:auto;padding:1.5rem}

/* ── Welcome ───────────────────────────────────────────────────────────── */
.welcome{
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  min-height:65vh;text-align:center;gap:1.25rem;padding:2rem;
}
.welcome img{
  width:120px;height:120px;object-fit:contain;
  opacity:.15;
}
.welcome h2{
  font-family:var(--ff-head);font-size:1.4rem;font-weight:800;
  letter-spacing:.15em;text-transform:uppercase;color:var(--black);
}
.welcome p{color:var(--mid);max-width:320px;font-size:.88rem;line-height:1.7}

/* ── Cards ─────────────────────────────────────────────────────────────── */
.card{
  background:var(--white);
  border:1.5px solid var(--rule);
  border-radius:1px;
  overflow:hidden;
  margin-bottom:1.1rem;
}
.card:last-child{margin-bottom:0}
.ch{
  padding:.65rem 1rem;
  border-bottom:1.5px solid var(--rule);
  display:flex;justify-content:space-between;align-items:center;
  background:var(--paper);
}
.ch h3{
  font-family:var(--ff-head);
  font-size:.65rem;font-weight:800;
  letter-spacing:.18em;text-transform:uppercase;
  color:var(--black);
}
.ch span{font-size:.75rem;color:var(--mid)}
.cb{padding:1rem}

/* ── Recipe editor layout ──────────────────────────────────────────────── */
.recipe-grid{display:grid;grid-template-columns:1fr 300px;gap:1.25rem;align-items:start}

/* ── Recipe name ──────────────────────────────────────────────────────── */
.recipe-name-row{
  padding:.65rem 1rem;
  border-bottom:1.5px solid var(--rule);
  background:var(--paper);
  display:flex;align-items:center;gap:.75rem;
}
.recipe-name-row label{
  font-family:var(--ff-head);
  font-size:.58rem;letter-spacing:.18em;text-transform:uppercase;
  color:var(--light);white-space:nowrap;
}
.recipe-name-row input{
  flex:1;border:none;background:transparent;
  font-family:var(--ff-head);font-size:1rem;font-weight:800;
  letter-spacing:.05em;text-transform:uppercase;color:var(--black);outline:none;
}

/* ── Recipe image ─────────────────────────────────────────────────────── */
.img-frame{
  width:100%;
  aspect-ratio:16/7;
  background:var(--faint);
  overflow:hidden;
  display:flex;align-items:center;justify-content:center;
  position:relative;
}
.img-frame img{width:100%;height:100%;object-fit:cover;display:block}
.img-ph{text-align:center;color:var(--light);pointer-events:none}
.img-ph svg{opacity:.35;display:block;margin:0 auto .5rem}
.img-ph p{font-size:.72rem;font-family:var(--ff-head);letter-spacing:.08em;text-transform:uppercase}
.img-url-row{
  display:flex;gap:.5rem;padding:.65rem 1rem;
  background:var(--paper);border-top:1.5px solid var(--rule);
}
.img-url-row input{
  flex:1;border:1.5px solid var(--rule);border-radius:2px;
  padding:.38rem .6rem;font-size:.8rem;font-family:var(--ff-body);
  outline:none;color:var(--black);background:var(--white);
}
.img-url-row input:focus{border-color:var(--teal)}

/* ── Ingredients table ─────────────────────────────────────────────────── */
.ing-table{width:100%;border-collapse:collapse;font-size:.82rem}
.ing-table th{
  text-align:left;padding:.42rem .55rem;
  font-family:var(--ff-head);
  font-size:.58rem;letter-spacing:.14em;text-transform:uppercase;
  color:var(--light);border-bottom:2px solid var(--rule);font-weight:700;
  background:var(--paper);
}
.ing-table td{padding:.4rem .55rem;border-bottom:1px solid var(--faint)}
.ing-table tr:hover td{background:var(--paper)}
.ing-table tr:last-child td{border-bottom:none}
.ing-table td input,
.ing-table td select{
  width:100%;border:1.5px solid transparent;border-radius:2px;
  padding:.2rem .35rem;font-family:var(--ff-body);font-size:.82rem;
  background:transparent;color:var(--black);outline:none;
}
.ing-table td input:focus,
.ing-table td select:focus{border-color:var(--teal);background:var(--teal-light)}
.td-cost{color:var(--mid);font-size:.78rem;white-space:nowrap}
.btn-rm{
  background:none;border:none;color:var(--rule);cursor:pointer;
  font-size:1.1rem;padding:0 3px;line-height:1;transition:color .15s;
}
.btn-rm:hover{color:var(--red)}

.add-row{
  display:flex;gap:.5rem;padding:.65rem 1rem;
  background:var(--paper);border-top:1.5px solid var(--rule);
}
.add-row select,.add-row input{
  border:1.5px solid var(--rule);border-radius:2px;
  padding:.38rem .55rem;font-size:.8rem;
  font-family:var(--ff-body);outline:none;
  color:var(--black);background:var(--white);
}
.add-row select{flex:2}.add-row input{flex:1}
.add-row select:focus,.add-row input:focus{border-color:var(--teal)}

/* ── Summary panel ─────────────────────────────────────────────────────── */
.sum-row{
  display:flex;justify-content:space-between;align-items:center;
  padding:.42rem 0;border-bottom:1px solid var(--faint);
}
.sum-row:last-child{border-bottom:none}
.sum-lbl{font-size:.8rem;color:var(--mid)}
.sum-val{font-size:.85rem;font-weight:700}
.sum-val.big{
  font-family:var(--ff-head);font-size:1rem;
  letter-spacing:.03em;color:var(--teal);
}
.sum-val.good{color:var(--green)}
.sum-val.warn{color:var(--amber)}
.sum-val.bad{color:var(--red)}
.sum-input{
  text-align:right;width:72px;
  border:1.5px solid var(--rule);border-radius:2px;
  padding:.22rem .4rem;font-family:var(--ff-body);
  font-size:.85rem;font-weight:700;outline:none;color:var(--black);
}
.sum-input:focus{border-color:var(--teal)}
.sum-divider{border:none;border-top:2px solid var(--black);margin:.35rem 0}

/* ── Allergen badges ───────────────────────────────────────────────────── */
.allergen-list{display:flex;flex-wrap:wrap;gap:.3rem;margin-top:.4rem}
.ab{
  display:inline-block;
  border-radius:1px;
  padding:.15rem .5rem;
  font-family:var(--ff-head);
  font-size:.62rem;font-weight:700;
  letter-spacing:.08em;text-transform:uppercase;
  background:var(--faint);color:var(--charcoal);border:1px solid var(--rule);
}
.ab.fish{background:#ddeeff;color:#1a4a8a;border-color:#a8c8f0}
.ab.dairy{background:#fff2e8;color:#8a3a10;border-color:#f0b080}
.ab.egg{background:#fffde0;color:#7a6010;border-color:#e8d840}
.ab.gluten{background:#f0ffe8;color:#2a6010;border-color:#90d060}
.ab.crustacean{background:#ffe8e8;color:#8a1010;border-color:#f09090}
.ab.mollusc{background:#ece8ff;color:#3a1a8a;border-color:#a090f0}
.ab.soy{background:#e8f5e8;color:#1a5a1a;border-color:#80c080}
.ab.sesame{background:#f5ece0;color:#6a3810;border-color:#d0a060}

/* ── Notes ──────────────────────────────────────────────────────────────── */
.notes-ta{
  width:100%;border:1.5px solid var(--rule);border-radius:2px;
  padding:.6rem;font-family:var(--ff-body);font-size:.82rem;
  color:var(--black);resize:vertical;min-height:70px;outline:none;
  background:var(--white);
}
.notes-ta:focus{border-color:var(--teal)}

/* ── Ingredients management ─────────────────────────────────────────────── */
.mgmt-table{width:100%;border-collapse:collapse;font-size:.8rem}
.mgmt-table th{
  text-align:left;padding:.42rem .55rem;
  font-family:var(--ff-head);font-size:.58rem;
  letter-spacing:.14em;text-transform:uppercase;
  color:var(--light);border-bottom:2px solid var(--rule);
  background:var(--paper);font-weight:700;
}
.mgmt-table td{padding:.35rem .55rem;border-bottom:1px solid var(--faint)}
.mgmt-table td input{
  width:100%;border:1.5px solid transparent;border-radius:2px;
  padding:.2rem .35rem;font-family:var(--ff-body);font-size:.8rem;
  background:transparent;outline:none;color:var(--black);
}
.mgmt-table td input:focus{border-color:var(--teal);background:var(--teal-light)}

/* ── GitHub sync banner ─────────────────────────────────────────────────── */
.sync-bar{
  background:var(--paper);
  border-bottom:1.5px solid var(--rule);
  padding:.5rem 1.5rem;
  display:flex;align-items:center;gap:.75rem;
  font-size:.75rem;
  flex-wrap:wrap;
}
.sync-bar input{
  border:1.5px solid var(--rule);border-radius:2px;
  padding:.3rem .55rem;font-family:var(--ff-body);font-size:.75rem;
  outline:none;background:var(--white);color:var(--black);
}
.sync-bar input:focus{border-color:var(--teal)}
.sync-bar input.wide{flex:1;min-width:160px}
.sync-status{
  font-size:.7rem;padding:.25rem .6rem;border-radius:10px;
  background:var(--faint);color:var(--mid);white-space:nowrap;
}
.sync-status.ok{background:#e6f4f0;color:var(--teal-dark)}
.sync-status.err{background:#fde8e8;color:var(--red)}
.sync-status.loading{background:#fef8e8;color:var(--amber)}

/* ════════════════════════════════════════════════════════════════════════════
   PRINT  —  full A4 portrait, one page
════════════════════════════════════════════════════════════════════════════ */
@media print{
  @page{size:A4 portrait;margin:10mm 13mm}
  body{background:#fff;font-size:10px}
  .sidebar,.topbar,.sync-bar,.content>*:not(#print-root){display:none!important}
  .app{display:block}
  .main{display:block}
  .content{padding:0;overflow:visible}
  #print-root{display:block!important}
}

/* Print root hidden on screen */
#print-root{
  display:none;
  font-family:'Lato',sans-serif;
  font-size:9pt;
  color:#111;
  background:#fff;
}

/* ── Print: header ─────────────────────────────────────────── */
.pr-header{
  display:flex;align-items:flex-end;gap:10pt;
  padding-bottom:6pt;
  border-bottom:2pt solid #111;
  margin-bottom:7pt;
}
.pr-logo{width:55pt;flex-shrink:0}
.pr-logo img{width:100%;display:block}
.pr-title{flex:1}
.pr-eyebrow{
  font-family:'Raleway',sans-serif;
  font-size:6pt;letter-spacing:.2em;text-transform:uppercase;
  color:#9a9a9a;margin-bottom:2pt;
}
.pr-name{
  font-family:'Raleway',sans-serif;
  font-size:20pt;font-weight:800;
  text-transform:uppercase;letter-spacing:.04em;
  line-height:1;color:#111;
}
.pr-pills{display:flex;gap:4pt;flex-wrap:wrap;margin-top:4pt}
.pr-pill{
  font-family:'Raleway',sans-serif;
  font-size:6pt;font-weight:700;letter-spacing:.08em;text-transform:uppercase;
  padding:1.5pt 5pt;border-radius:1pt;
  background:#f5f0e8;color:#6b6b6b;border:.5pt solid #d8d2c8;
}
.pr-pill.dark{background:#111;color:#fff;border-color:#111}
.pr-pill.teal{background:#2a7e72;color:#fff;border-color:#2a7e72}
.pr-pill.good{background:#e0f0e8;color:#2a6e44;border-color:#90c0a8}
.pr-pill.warn{background:#fff0d0;color:#b87010;border-color:#e0c060}
.pr-pill.bad{background:#ffe0e0;color:#9e2a2a;border-color:#e09090}

/* ── Print: image ──────────────────────────────────────────── */
.pr-image{
  width:100%;height:68mm;
  overflow:hidden;border:1pt solid #ece7df;
  display:flex;align-items:center;justify-content:center;
  background:#f5f0e8;margin-bottom:7pt;
  position:relative;
}
.pr-image img{width:100%;height:100%;object-fit:cover;display:block}
.pr-image-none{font-size:8pt;color:#9a9a9a;font-style:italic}

/* ── Print: two-col body ───────────────────────────────────── */
.pr-body{display:flex;gap:9pt}
.pr-left{flex:1;min-width:0}
.pr-right{width:105pt;flex-shrink:0}

/* ── Print: section heading ────────────────────────────────── */
.pr-sec{
  font-family:'Raleway',sans-serif;
  font-size:6pt;font-weight:800;letter-spacing:.2em;text-transform:uppercase;
  color:#6b6b6b;
  border-bottom:1pt solid #111;padding-bottom:2pt;margin-bottom:4pt;
}

/* ── Print: ingredients table ──────────────────────────────── */
.pr-ing{width:100%;border-collapse:collapse;font-size:8pt}
.pr-ing th{
  text-align:left;padding:2pt 3pt;
  font-family:'Raleway',sans-serif;
  font-size:6pt;letter-spacing:.1em;text-transform:uppercase;
  color:#9a9a9a;border-bottom:1pt solid #d8d2c8;font-weight:700;
}
.pr-ing th:last-child,.pr-ing td:last-child{text-align:right}
.pr-ing td{
  padding:2.5pt 3pt;border-bottom:.5pt solid #ece7df;font-size:8pt;
}
.pr-ing tr:last-child td{border-bottom:none}
.pr-ing .qty{color:#6b6b6b;white-space:nowrap}
.pr-ing .cost{color:#6b6b6b}

/* ── Print: cost summary ───────────────────────────────────── */
.pr-sum-row{
  display:flex;justify-content:space-between;align-items:baseline;
  padding:2pt 0;border-bottom:.5pt solid #ece7df;font-size:8pt;
}
.pr-sum-row:last-child{border-bottom:none}
.pr-sum-row .l{color:#6b6b6b}
.pr-sum-row .v{font-weight:700}
.pr-sum-sep{border:none;border-top:1.5pt solid #111;margin:2pt 0}
.pr-sum-row.highlight .l{font-weight:700;color:#111;font-size:8.5pt}
.pr-sum-row.highlight .v{color:#2a7e72;font-size:10pt;font-family:'Raleway',sans-serif;font-weight:800}
.pr-sum-row.retail .l{font-weight:700;color:#111}
.pr-sum-row.retail .v{color:#111;font-size:10.5pt;font-family:'Raleway',sans-serif;font-weight:800}

/* ── Print: allergens ──────────────────────────────────────── */
.pr-ab-list{display:flex;flex-wrap:wrap;gap:3pt;margin-top:3pt}
.pr-ab{
  font-family:'Raleway',sans-serif;
  font-size:6pt;font-weight:700;letter-spacing:.06em;text-transform:uppercase;
  padding:1.5pt 4pt;border-radius:1pt;
  background:#f5f0e8;color:#6b6b6b;border:.5pt solid #d8d2c8;
}

/* ── Print: notes ──────────────────────────────────────────── */
.pr-notes{font-size:7.5pt;color:#6b6b6b;line-height:1.5;margin-top:3pt}

/* ── Print: footer ─────────────────────────────────────────── */
.pr-footer{
  margin-top:7pt;padding-top:4pt;
  border-top:.75pt solid #d8d2c8;
  display:flex;justify-content:space-between;align-items:center;
}
.pr-footer-l{
  font-family:'Raleway',sans-serif;
  font-size:6pt;letter-spacing:.15em;text-transform:uppercase;color:#9a9a9a;
}
.pr-footer-r{font-size:6pt;color:#9a9a9a}
</style>
</head>
<body>
<div class="app">

<!-- ═══════ SIDEBAR ════════════════════════════════════════════════════════ -->

}

// GITHUB SYNC
// ═══════════════════════════════════════════════════════════════════════════
function ghConfig(){
  return {
    owner: document.getElementById('gh-owner').value.trim(),
    repo:  document.getElementById('gh-repo').value.trim(),
    token: document.getElementById('gh-token').value.trim()
  };
}

function setSyncStatus(msg, type=''){
  const el=document.getElementById('sync-status');
  el.textContent=msg;
  el.className='sync-status'+(type?' '+type:'');
}

async function ghGetFile(path){
  const {owner,repo,token}=ghConfig();
  if(!owner||!repo||!token){setSyncStatus('Fill in GitHub fields','err');return null;}
  const r=await fetch(`https://api.github.com/repos/${owner}/${repo}/contents/${path}`,{
    headers:{'Authorization':'token '+token,'Accept':'application/vnd.github.v3+json'}
  });
  if(r.status===404) return {exists:false};
  if(!r.ok){setSyncStatus('Error: '+r.status,'err');return null;}
  return await r.json();
}

async function ghPutFile(path, content, sha){
  const {owner,repo,token}=ghConfig();
  const body={
    message: sha ? 'Update '+path : 'Create '+path,
    content: btoa(unescape(encodeURIComponent(content))),
  };
  if(sha) body.sha=sha;
  const r=await fetch(`https://api.github.com/repos/${owner}/${repo}/contents/${path}`,{
    method:'PUT',
    headers:{'Authorization':'token '+token,'Content-Type':'application/json','Accept':'application/vnd.github.v3+json'},
    body:JSON.stringify(body)
  });
  return r.ok;
}

async function syncFromGitHub(){
  setSyncStatus('Loading…','loading');
  const file=await ghGetFile('data/recipes.json');
  if(!file) return;
  if(file.exists===false){setSyncStatus('No data file found — save first','err');return;}
  try{
    const text=decodeURIComponent(escape(atob(file.content.replace(/\n/g,''))));
    const data=JSON.parse(text);
    if(data.ingredients) S.ing=data.ingredients;
    if(data.recipes)     S.rec=data.recipes;
    saveLocal();
    renderSidebar();
    setSyncStatus('Loaded ✓','ok');
    // refresh current view
    if(curId) openRecipe(curId);
  }catch(e){setSyncStatus('Parse error: '+e.message,'err');}
}

async function syncToGitHub(){
  setSyncStatus('Saving…','loading');
  const payload=JSON.stringify({ingredients:S.ing, recipes:S.rec}, null, 2);
  const existing=await ghGetFile('data/recipes.json');
  if(!existing) return;
  const sha=existing.sha||null;
  const ok=await ghPutFile('data/recipes.json', payload, sha);
  if(ok) setSyncStatus('Saved to GitHub ✓','ok');
  else   setSyncStatus('Save failed','err');
}

// CALC
// ═══════════════════════════════════════════════════════════════════════════
function calc(r){
  const raw=r.items.reduce((s,it)=>s+(it.qty*it.costPerUnit),0);
  const waste=raw*r.wastage;
  const sub=raw+waste;
  const gstAmt=sub*r.gst;
  const total=sub+gstAmt;
  const por=r.portions>0?sub/r.portions:0;
  const porGst=r.portions>0?total/r.portions:0;
  const fcp=r.retail>0?porGst/r.retail:0;
  return{raw,waste,sub,gstAmt,total,por,porGst,fcp};
}

function deriveAllergens(items){
  const set=new Set();
  items.forEach(it=>{
    const ing=S.ing.find(i=>i.name===it.name);
    if(ing&&ing.allergen){
      ing.allergen.split(',').forEach(a=>{const n=normAllergen(a);if(n)set.add(n);});
    }
  });
  return Array.from(set).sort().join(', ');
}

// ═══════════════════════════════════════════════════════════════════════════
// SIDEBAR
// ═══════════════════════════════════════════════════════════════════════════
function renderSidebar(){
  const el=document.getElementById('sb-list');
  el.innerHTML='';
  S.rec.forEach(r=>{
    const c=calc(r);
    const div=document.createElement('div');
    div.className='sb-item'+(r.id===curId?' active':'');
    div.innerHTML=`<div class="sb-item-name">${r.name}</div>
      <div class="sb-item-meta">$${c.porGst.toFixed(2)} / portion · Retail $${r.retail.toFixed(2)}</div>`;
    div.onclick=()=>openRecipe(r.id);
    el.appendChild(div);
  });
}

// RECIPE EDITOR

function openRecipe(id){
  curId=id;
  renderSidebar();
  const r=S.rec.find(x=>x.id===id);
  if(!r) return;
  document.getElementById('topbar-title').textContent=r.name;
  document.getElementById('topbar-actions').innerHTML=`
    <button class="btn btn-ghost" onclick="showIngredients()">⚙ Ingredients</button>
    <button class="btn btn-danger" onclick="deleteRecipe('${id}')">Delete</button>
    <button class="btn btn-solid" onclick="doPrint()">🖨 Print</button>`;
  renderEditor(r);
}

function allergenClass(a){
  const m={fish:'fish',dairy:'dairy',egg:'egg',gluten:'gluten',wheat:'gluten',crustacean:'crustacean',mollusc:'mollusc',soy:'soy',sesame:'sesame'};
  return m[a.toLowerCase().trim()]||'';
}

function renderEditor(r){

  const allergenBadges=r.allergens.split(',').map(a=>a.trim()).filter(Boolean)
    .map(a=>`<span class="ab ${allergenClass(a)}">${esc(a)}</span>`).join('');

  const ingOpts=S.ing.map(i=>`<option value="${esc(i.name)}">${esc(i.name)} (${i.unit}${i.cost?', $'+i.cost.toFixed(2):''})</option>`).join('');

    <tr>
      <td>

          <option value="${esc(it.name)}">${esc(it.name)}</option>

      <td><input type="number" value="${it.costPerUnit}" step="0.01" min="0" onchange="updIng(${idx},'costPerUnit',+this.value)" style="max-width:72px"/></td>
      <td class="td-cost">$${(it.qty*it.costPerUnit).toFixed(3)}</td>
      <td><button class="btn-rm" onclick="rmIng(${idx})">×</button></td>
    </tr>`).join('');

        <div class="card">
          <div class="recipe-name-row">
            <label>Recipe</label>
            <input value="${esc(r.name)}" oninput="updMeta('name',this.value)" onchange="renderSidebar()"/>

          </div>

            <input type="url" id="img-input" placeholder="Paste image URL…" value="${esc(r.imageUrl||'')}"/>

          </div>
        </div>

        <div class="card">
          <div class="ch"><h3>Ingredients</h3><span>Recipe cost: <strong>$${c.raw.toFixed(2)}</strong></span></div>

            <tbody>${ingRows}</tbody>

        </div>

        <div class="card">

            <textarea class="notes-ta" placeholder="Method, presentation, storage notes…" oninput="updMeta('notes',this.value)">${esc(r.notes||'')}</textarea>
          </div>
        </div>
      </div>

      <!-- RIGHT -->
      <div>
        <div class="card">
          <div class="ch"><h3>Costing Summary</h3></div>
          <div class="cb">
            <div class="sum-row">
              <span class="sum-lbl">Portions</span>
              <input class="sum-input" type="number" min="1" value="${r.portions}" onchange="updMeta('portions',+this.value)"/>
            </div>
            <div class="sum-row">
              <span class="sum-lbl">Wastage</span>
              <span style="display:flex;align-items:center;gap:4px">
                <input class="sum-input" type="number" min="0" max="100" step="1" value="${wastePct}" onchange="updMeta('wastage',+this.value/100)" style="width:55px"/>

            </div>
            <div class="sum-row">
              <span class="sum-lbl">GST</span>
              <span style="display:flex;align-items:center;gap:4px">
                <input class="sum-input" type="number" min="0" max="100" step="1" value="${gstPct}" onchange="updMeta('gst',+this.value/100)" style="width:55px"/>
                <span style="font-size:.75rem;color:var(--mid)">%</span>
              </span>
            </div>
            <hr class="sum-divider"/>
            <div class="sum-row"><span class="sum-lbl">Recipe cost</span><span class="sum-val">$${c.raw.toFixed(2)}</span></div>
            <div class="sum-row"><span class="sum-lbl">Wastage (${ wastePct}%)</span><span class="sum-val">$${c.waste.toFixed(2)}</span></div>
            <div class="sum-row"><span class="sum-lbl">Sub total</span><span class="sum-val">$${c.sub.toFixed(2)}</span></div>

            <hr class="sum-divider"/>
            <div class="sum-row"><span class="sum-lbl">Portion cost excl. GST</span><span class="sum-val big">$${c.por.toFixed(2)}</span></div>
            <div class="sum-row"><span class="sum-lbl">Portion cost incl. GST</span><span class="sum-val big">$${c.porGst.toFixed(2)}</span></div>
            <hr class="sum-divider"/>
            <div class="sum-row" style="padding:.6rem 0">
              <span class="sum-lbl" style="font-weight:700;color:var(--black);font-size:.85rem">Retail Price</span>
              <span style="display:flex;align-items:center;gap:3px">
                <span style="font-weight:700;font-family:var(--ff-head)">$</span>
                <input class="sum-input" type="number" min="0" step="0.50" value="${r.retail}" onchange="updMeta('retail',+this.value)" style="width:72px;font-size:.95rem"/>
              </span>
            </div>
            <div class="sum-row">
              <span class="sum-lbl">Food cost %</span>
              <span class="sum-val ${fcpClass}" style="font-family:var(--ff-head);font-size:.95rem">${(c.fcp*100).toFixed(1)}%</span>
            </div>
          </div>
        </div>

        <div class="card">
          <div class="ch"><h3>Allergens</h3></div>
          <div class="cb">
            <div style="font-size:.72rem;color:var(--mid);margin-bottom:.35rem;font-family:var(--ff-head);letter-spacing:.05em;text-transform:uppercase">Auto-detected</div>
            <div class="allergen-list">
              ${allergenBadges||`<span style="color:var(--light);font-size:.75rem">None detected</span>`}
            </div>
            <div style="margin-top:.75rem">
              <label style="font-size:.65rem;color:var(--light);display:block;margin-bottom:.3rem;font-family:var(--ff-head);letter-spacing:.1em;text-transform:uppercase">Override</label>
              <input style="width:100%;border:1.5px solid var(--rule);border-radius:2px;padding:.38rem .5rem;font-size:.8rem;font-family:var(--ff-body);outline:none;color:var(--black)"
                value="${esc(r.allergens)}" oninput="updMeta('allergens',this.value)" placeholder="e.g. Contains Fish, Gluten"/>
            </div>
          </div>
        </div>
      </div>
    </div>`;

  buildPrintRoot(r,c,allergenStr);
}

// ═══════════════════════════════════════════════════════════════════════════
// PRINT
// ═══════════════════════════════════════════════════════════════════════════
function buildPrintRoot(r,c,allergenStr){
  const fcpClass=c.fcp<0.28?'good':c.fcp<0.35?'warn':'bad';
  const gstPct=Math.round(r.gst*100);
  const allergens=(allergenStr||r.allergens||'').split(',').map(a=>a.trim()).filter(Boolean);
  const date=new Date().toLocaleDateString('en-NZ',{day:'numeric',month:'long',year:'numeric'});

  const ingRows=r.items.map(it=>`
    <tr>
      <td>${esc(it.name)}</td>
      <td class="qty">${it.qty} ${it.unit}</td>
      <td class="cost">$${(it.qty*it.costPerUnit).toFixed(3)}</td>
    </tr>`).join('');

  document.getElementById('print-root').innerHTML=`
    <div class="pr-header">
      <div class="pr-logo"><img src="${LOGO}" alt="Little Fish Co"/></div>
      <div class="pr-title">
        <div class="pr-eyebrow">Little Fish Co — Recipe Costing Sheet</div>
        <div class="pr-name">${esc(r.name)}</div>
        <div class="pr-pills">
          <span class="pr-pill">${r.portions} portion${r.portions!==1?'s':''}</span>
          <span class="pr-pill">GST ${gstPct}%</span>
          ${r.wastage>0?`<span class="pr-pill">Wastage ${Math.round(r.wastage*100)}%</span>`:''}
          <span class="pr-pill dark">Retail $${r.retail.toFixed(2)}</span>
          <span class="pr-pill teal ${fcpClass}">${(c.fcp*100).toFixed(1)}% food cost</span>
        </div>
      </div>
    </div>

    <div class="pr-image">
      ${r.imageUrl
        ?`<img src="${esc(r.imageUrl)}" alt="${esc(r.name)}"/>`
        :`<span class="pr-image-none">No image provided</span>`}
    </div>

    <div class="pr-body">
      <div class="pr-left">
        <div class="pr-sec">Ingredients</div>
        <table class="pr-ing">
          <thead><tr><th>Ingredient</th><th>Quantity</th><th>Cost</th></tr></thead>
          <tbody>${ingRows}</tbody>
        </table>

        ${allergens.length?`
          <div style="margin-top:6pt">
            <div class="pr-sec">Allergens</div>
            <div class="pr-ab-list">
              ${allergens.map(a=>`<span class="pr-ab">${esc(a)}</span>`).join('')}
            </div>
          </div>`:''}

        ${r.notes?`
          <div style="margin-top:6pt">
            <div class="pr-sec">Notes</div>
            <div class="pr-notes">${esc(r.notes)}</div>
          </div>`:''}
      </div>

      <div class="pr-right">
        <div class="pr-sec">Cost Summary</div>
        <div class="pr-sum-row"><span class="l">Recipe cost</span><span class="v">$${c.raw.toFixed(2)}</span></div>
        <div class="pr-sum-row"><span class="l">Wastage (${Math.round(r.wastage*100)}%)</span><span class="v">$${c.waste.toFixed(2)}</span></div>
        <div class="pr-sum-row"><span class="l">Sub total</span><span class="v">$${c.sub.toFixed(2)}</span></div>
        <div class="pr-sum-row"><span class="l">GST (${gstPct}%)</span><span class="v">$${c.gstAmt.toFixed(2)}</span></div>
        <hr class="pr-sum-sep"/>
        <div class="pr-sum-row highlight"><span class="l">Portion cost excl.</span><span class="v">$${c.por.toFixed(2)}</span></div>
        <div class="pr-sum-row highlight"><span class="l">Portion cost incl. GST</span><span class="v">$${c.porGst.toFixed(2)}</span></div>
        <hr class="pr-sum-sep"/>
        <div class="pr-sum-row retail" style="margin-top:3pt"><span class="l">Retail Price</span><span class="v">$${r.retail.toFixed(2)}</span></div>
        <div class="pr-sum-row">
          <span class="l">Food cost %</span>
          <span class="v" style="color:${c.fcp<0.28?'#2a6e44':c.fcp<0.35?'#b87010':'#9e2a2a'};font-family:'Raleway',sans-serif;font-size:10pt">${(c.fcp*100).toFixed(1)}%</span>
        </div>
      </div>
    </div>

    <div class="pr-footer">
      <span class="pr-footer-l">Little Fish Co · Recipe Costing</span>
      <span class="pr-footer-r">Printed ${date}</span>
    </div>`;
}

function doPrint(){
  const r=S.rec.find(x=>x.id===curId);
  if(!r) return;
  const c=calc(r);
  buildPrintRoot(r,c,deriveAllergens(r.items));
  window.print();
}

// ═══════════════════════════════════════════════════════════════════════════
// MUTATIONS
// ═══════════════════════════════════════════════════════════════════════════
function updIng(idx,field,value){
  const r=S.rec.find(x=>x.id===curId);if(!r)return;
  if(field==='name'){
    const ing=S.ing.find(i=>i.name===value);
    r.items[idx].name=value;
    if(ing){r.items[idx].costPerUnit=ing.cost;r.items[idx].unit=ing.unit;}
  } else { r.items[idx][field]=value; }
  r.allergens=deriveAllergens(r.items);
  saveLocal();renderEditor(r);
}
function rmIng(idx){
  const r=S.rec.find(x=>x.id===curId);if(!r)return;
  r.items.splice(idx,1);
  r.allergens=deriveAllergens(r.items);
  saveLocal();renderEditor(r);
}
function addIng(){
  const sel=document.getElementById('add-sel');
  const qty=parseFloat(document.getElementById('add-qty').value)||0;
  if(!sel.value)return;
  const r=S.rec.find(x=>x.id===curId);if(!r)return;
  const ing=S.ing.find(i=>i.name===sel.value);
  r.items.push({name:sel.value,qty,costPerUnit:ing?ing.cost:0,unit:ing?ing.unit:''});
  r.allergens=deriveAllergens(r.items);
  saveLocal();sel.value='';document.getElementById('add-qty').value='';
  renderEditor(r);
}
function updMeta(field,value){
  const r=S.rec.find(x=>x.id===curId);if(!r)return;
  r[field]=value;saveLocal();
  if(['portions','wastage','gst','retail'].includes(field))renderEditor(r);
  if(field==='name')document.getElementById('topbar-title').textContent=value;
}
function applyImg(){
  const url=document.getElementById('img-input').value.trim();
  updMeta('imageUrl',url);
  renderEditor(S.rec.find(x=>x.id===curId));
}
function deleteRecipe(id){
  if(!confirm('Delete this recipe?'))return;
  S.rec=S.rec.filter(r=>r.id!==id);saveLocal();
  curId=null;
  document.getElementById('topbar-title').textContent='Little Fish Co';
  document.getElementById('topbar-actions').innerHTML='';
  document.getElementById('content').innerHTML=`<div class="welcome"><img src="${LOGO}" alt=""/><h2>Recipe Costing</h2><p>Select a recipe or create a new one.</p></div>`;
  document.getElementById('print-root').innerHTML='';
  renderSidebar();
}
function newRecipe(){
  const id='rec_'+Date.now();
  S.rec.push({id,name:'New Recipe',items:[],portions:1,wastage:0,gst:0.15,retail:0,allergens:'',imageUrl:'',notes:''});
  saveLocal();renderSidebar();openRecipe(id);
}

// ═══════════════════════════════════════════════════════════════════════════
// INGREDIENTS MANAGEMENT
// ═══════════════════════════════════════════════════════════════════════════
function showIngredients(){
  curId=null;renderSidebar();
  document.getElementById('topbar-title').textContent='Ingredients';
  document.getElementById('topbar-actions').innerHTML=`<button class="btn btn-teal" onclick="addIngredient()">+ Add</button>`;
  document.getElementById('print-root').innerHTML='';

  const rows=S.ing.map((ing,idx)=>`
    <tr>
      <td><input value="${esc(ing.name)}" onchange="updIngredient(${idx},'name',this.value)"/></td>
      <td><input value="${esc(ing.unit)}" onchange="updIngredient(${idx},'unit',this.value)"/></td>
      <td><input type="number" value="${ing.cost}" step="0.01" onchange="updIngredient(${idx},'cost',+this.value)"/></td>
      <td><input value="${esc(ing.allergen)}" onchange="updIngredient(${idx},'allergen',this.value)"/></td>
      <td><input value="${esc(ing.dietary)}" onchange="updIngredient(${idx},'dietary',this.value)"/></td>
      <td><button class="btn-rm" onclick="removeIngredient(${idx})">×</button></td>
    </tr>`).join('');

  document.getElementById('content').innerHTML=`
    <div class="card">
      <div class="ch"><h3>All Ingredients (${S.ing.length})</h3></div>
      <div style="overflow-x:auto">
        <table class="mgmt-table">
          <thead><tr><th>Name</th><th>Unit</th><th>$/Unit</th><th>Allergen</th><th>Dietary</th><th></th></tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>
    </div>`;
}
function updIngredient(idx,f,v){S.ing[idx][f]=v;saveLocal();}
function removeIngredient(idx){if(!confirm('Remove?'))return;S.ing.splice(idx,1);saveLocal();showIngredients();}
function addIngredient(){
  S.ing.push({name:'New Ingredient',unit:'kg',cost:0,allergen:'',dietary:'',type:'Ingredient'});
  saveLocal();showIngredients();
  setTimeout(()=>{document.getElementById('content').scrollTop=99999;},50);
}

// ═══════════════════════════════════════════════════════════════════════════
// UTILS
// ═══════════════════════════════════════════════════════════════════════════
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

['gh-owner','gh-repo','gh-token'].forEach(id=>{
  const v=localStorage.getItem('lfc_'+id);
  if(v) document.getElementById(id).value=v;
});
['gh-owner','gh-repo','gh-token'].forEach(id=>{
  document.getElementById(id).addEventListener('change',function(){
    localStorage.setItem('lfc_'+id, this.value);

});

renderSidebar();
