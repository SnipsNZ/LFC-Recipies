<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Little Fish Co — Recipe Costing</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Source+Sans+3:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root {
  --navy:#1a2744;
  --ocean:#2563a8;
  --seafoam:#4da8a0;
  --sand:#f5f0e6;
  --cream:#fdf9f3;
  --ink:#1c1c1c;
  --mid:#5a6272;
  --faint:#e2ddd4;
  --white:#ffffff;
  --green:#2d7a4f;
  --amber:#c07a1a;
  --red:#b03030;
}

body{font-family:'Source Sans 3',sans-serif;background:var(--sand);color:var(--ink);min-height:100vh}

/* ── APP SHELL ── */
.app{display:grid;grid-template-columns:280px 1fr;min-height:100vh}

/* ── SIDEBAR ── */
.sidebar{background:var(--navy);color:var(--white);display:flex;flex-direction:column;overflow:hidden}
.sidebar-logo{padding:1.5rem 1.25rem 1rem;border-bottom:1px solid rgba(255,255,255,.1)}
.sidebar-logo img{max-width:120px;display:block;margin:0 auto;filter:brightness(0) invert(1)}
.sidebar-logo h2{text-align:center;font-family:'Playfair Display',serif;font-size:1rem;margin-top:.5rem;color:rgba(255,255,255,.7);font-weight:400;letter-spacing:.05em}

.sidebar-actions{padding:.75rem 1rem}
.btn-new{width:100%;background:var(--seafoam);color:white;border:none;padding:.65rem 1rem;border-radius:6px;font-family:'Source Sans 3',sans-serif;font-size:.9rem;font-weight:600;cursor:pointer;transition:background .2s;letter-spacing:.02em}
.btn-new:hover{background:#3d9891}

.sidebar-section-label{padding:.75rem 1rem .25rem;font-size:.65rem;letter-spacing:.12em;text-transform:uppercase;color:rgba(255,255,255,.4)}

.recipe-list{flex:1;overflow-y:auto;padding:.25rem 0 1rem}
.recipe-list::-webkit-scrollbar{width:4px}
.recipe-list::-webkit-scrollbar-thumb{background:rgba(255,255,255,.2);border-radius:2px}

.recipe-item{padding:.6rem 1.25rem;cursor:pointer;transition:background .15s;border-left:3px solid transparent;font-size:.88rem}
.recipe-item:hover{background:rgba(255,255,255,.07)}
.recipe-item.active{background:rgba(255,255,255,.1);border-left-color:var(--seafoam);color:white;font-weight:600}
.recipe-item-name{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.recipe-item-cost{font-size:.75rem;color:rgba(255,255,255,.4);margin-top:1px}

/* ── MAIN ── */
.main{display:flex;flex-direction:column;overflow:hidden}

.topbar{background:var(--white);border-bottom:1px solid var(--faint);padding:.75rem 1.5rem;display:flex;align-items:center;gap:1rem}
.topbar h1{font-family:'Playfair Display',serif;font-size:1.3rem;font-weight:700;flex:1}
.btn{padding:.5rem 1.1rem;border-radius:6px;font-family:'Source Sans 3',sans-serif;font-size:.85rem;font-weight:600;cursor:pointer;border:none;transition:all .2s}
.btn-primary{background:var(--ocean);color:white}
.btn-primary:hover{background:#1b4f8a}
.btn-secondary{background:transparent;color:var(--mid);border:1.5px solid var(--faint)}
.btn-secondary:hover{border-color:var(--ocean);color:var(--ocean)}
.btn-danger{background:transparent;color:var(--red);border:1.5px solid var(--faint)}
.btn-danger:hover{border-color:var(--red)}
.btn-print{background:var(--navy);color:white}
.btn-print:hover{background:#0f1a32}

.content{flex:1;overflow-y:auto;padding:1.5rem}

/* ── RECIPE VIEW ── */
.recipe-grid{display:grid;grid-template-columns:1fr 320px;gap:1.5rem;align-items:start}

.card{background:var(--white);border-radius:10px;border:1px solid var(--faint);overflow:hidden}
.card-header{padding:1rem 1.25rem;border-bottom:1px solid var(--faint);display:flex;justify-content:space-between;align-items:center}
.card-header h3{font-family:'Playfair Display',serif;font-size:1rem;font-weight:600}
.card-body{padding:1.25rem}

/* Recipe image */
.recipe-image-wrap{background:var(--sand);height:180px;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
.recipe-image-wrap img{width:100%;height:100%;object-fit:cover}
.recipe-image-placeholder{text-align:center;color:var(--mid)}
.recipe-image-placeholder svg{opacity:.3}
.recipe-image-placeholder p{font-size:.8rem;margin-top:.5rem;opacity:.6}

.img-url-row{display:flex;gap:.5rem;padding:.75rem 1.25rem;border-top:1px solid var(--faint);background:var(--cream)}
.img-url-row input{flex:1;border:1.5px solid var(--faint);border-radius:5px;padding:.4rem .6rem;font-size:.82rem;font-family:'Source Sans 3',sans-serif;outline:none;color:var(--ink)}
.img-url-row input:focus{border-color:var(--ocean)}
.img-url-row .btn{padding:.4rem .75rem;font-size:.8rem}

/* Ingredients table */
table{width:100%;border-collapse:collapse;font-size:.85rem}
th{text-align:left;padding:.5rem .6rem;font-size:.7rem;letter-spacing:.08em;text-transform:uppercase;color:var(--mid);border-bottom:2px solid var(--faint);font-weight:600}
td{padding:.5rem .6rem;border-bottom:1px solid var(--faint)}
tr:last-child td{border-bottom:none}
td input,td select{width:100%;border:1.5px solid transparent;border-radius:4px;padding:.25rem .4rem;font-family:'Source Sans 3',sans-serif;font-size:.85rem;background:transparent;color:var(--ink);outline:none}
td input:focus,td select:focus{border-color:var(--ocean);background:var(--cream)}
.ing-cost{color:var(--mid);font-size:.82rem}
.btn-rm{background:none;border:none;color:var(--faint);cursor:pointer;font-size:1.1rem;line-height:1;padding:0 4px;transition:color .15s}
.btn-rm:hover{color:var(--red)}

.add-ing-row{display:flex;gap:.5rem;padding:.75rem 1.25rem;border-top:1px solid var(--faint);background:var(--cream)}
.add-ing-row select,.add-ing-row input{flex:1;border:1.5px solid var(--faint);border-radius:5px;padding:.4rem .6rem;font-size:.82rem;font-family:'Source Sans 3',sans-serif;outline:none;color:var(--ink)}
.add-ing-row select:focus,.add-ing-row input:focus{border-color:var(--ocean)}

/* Summary card */
.summary-grid{display:grid;gap:.75rem}
.summary-row{display:flex;justify-content:space-between;align-items:center;padding:.5rem 0;border-bottom:1px solid var(--faint)}
.summary-row:last-child{border-bottom:none}
.summary-label{font-size:.82rem;color:var(--mid)}
.summary-value{font-size:.9rem;font-weight:600}
.summary-value.highlight{color:var(--ocean);font-size:1rem}
.summary-value.good{color:var(--green)}
.summary-value.warn{color:var(--amber)}
.summary-value.bad{color:var(--red)}

.summary-input{text-align:right;width:80px;border:1.5px solid var(--faint);border-radius:4px;padding:.25rem .4rem;font-family:'Source Sans 3',sans-serif;font-size:.88rem;font-weight:600;outline:none;color:var(--ink)}
.summary-input:focus{border-color:var(--ocean)}

.allergen-badge{display:inline-block;background:#fff3cd;color:#7a5100;border:1px solid #f0d060;border-radius:4px;padding:.2rem .5rem;font-size:.75rem;margin:.15rem}

.meta-row{display:flex;gap:.5rem;align-items:center;margin-bottom:.75rem}
.meta-row label{font-size:.8rem;color:var(--mid);min-width:80px}
.meta-row input,
.meta-row textarea{flex:1;border:1.5px solid var(--faint);border-radius:5px;padding:.35rem .5rem;font-family:'Source Sans 3',sans-serif;font-size:.85rem;outline:none;color:var(--ink)}
.meta-row input:focus,.meta-row textarea:focus{border-color:var(--ocean)}
.meta-row textarea{resize:vertical;min-height:60px}

/* Welcome screen */
.welcome{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;text-align:center;padding:3rem;gap:1rem}
.welcome img{max-width:160px;opacity:.6}
.welcome h2{font-family:'Playfair Display',serif;font-size:1.6rem;color:var(--navy)}
.welcome p{color:var(--mid);max-width:360px;line-height:1.6}

/* Ingredients management view */
.ing-mgmt table{font-size:.83rem}
.ing-mgmt th{font-size:.68rem}
.ing-mgmt td input{font-size:.82rem}

/* ── PRINT STYLES ── */
@media print {
  body{background:white}
  .sidebar,.topbar,.btn,.add-ing-row,.img-url-row,.btn-rm,.meta-row,.print-hide{display:none!important}
  .app{display:block}
  .main{display:block}
  .content{padding:.5in}
  .recipe-grid{grid-template-columns:1fr 260px;gap:1rem}
  .card{border:1px solid #ccc;break-inside:avoid}
  .print-header{display:flex!important;align-items:center;gap:1rem;margin-bottom:1.5rem;padding-bottom:1rem;border-bottom:2px solid #1a2744}
  .print-header img{max-width:100px}
  .print-header h1{font-family:'Playfair Display',serif;font-size:1.4rem;color:#1a2744}
  .recipe-image-wrap{height:200px!important}
  table td input,table td select{border:none!important;background:transparent!important;padding:0}
  .summary-input{border:none!important;background:transparent!important}
}

.print-header{display:none}

/* Responsive */
@media(max-width:768px){
  .app{grid-template-columns:1fr}
  .sidebar{display:none}
  .recipe-grid{grid-template-columns:1fr}
}
</style>
</head>

function loadData() {
  try {
    const ri = localStorage.getItem('lfc_ingredients');
    const rr = localStorage.getItem('lfc_recipes');
    return {
      ingredients: ri ? JSON.parse(ri) : JSON.parse(JSON.stringify(BASE_INGREDIENTS)),
      recipes:     rr ? JSON.parse(rr) : JSON.parse(JSON.stringify(BASE_RECIPES))
    };
  } catch { return { ingredients: JSON.parse(JSON.stringify(BASE_INGREDIENTS)), recipes: JSON.parse(JSON.stringify(BASE_RECIPES)) }; }
}

function saveData() {
  localStorage.setItem('lfc_ingredients', JSON.stringify(state.ingredients));
  localStorage.setItem('lfc_recipes',     JSON.stringify(state.recipes));
}

let state = loadData();
let currentRecipeId = null;
let view = 'recipe'; // 'recipe' | 'ingredients'

// ── CALCS ─────────────────────────────────────────────────────────────────────
function calcRecipe(recipe) {
  const recipeRaw = recipe.items.reduce((s, it) => s + (it.qty * it.costPerUnit), 0);
  const wastageAmt = recipeRaw * recipe.wastage;
  const subTotal   = recipeRaw + wastageAmt;
  const gstAmt     = subTotal * recipe.gst;
  const totalIncGst = subTotal + gstAmt;
  const portionCost = recipe.portions > 0 ? subTotal / recipe.portions : 0;
  const portionCostGst = recipe.portions > 0 ? totalIncGst / recipe.portions : 0;
  const foodCostPct = recipe.retail > 0 ? portionCostGst / recipe.retail : 0;
  return { recipeRaw, wastageAmt, subTotal, gstAmt, totalIncGst, portionCost, portionCostGst, foodCostPct };
}

// ── SIDEBAR ───────────────────────────────────────────────────────────────────
function renderSidebar() {
  const el = document.getElementById('recipe-list');
  el.innerHTML = '';
  state.recipes.forEach(r => {
    const c = calcRecipe(r);
    const div = document.createElement('div');
    div.className = 'recipe-item' + (r.id === currentRecipeId ? ' active' : '');
    div.innerHTML = `<div class="recipe-item-name">${r.name}</div>
      <div class="recipe-item-cost">Portion: ${c.portionCostGst.toFixed(2)} incl. GST &nbsp;|&nbsp; Retail: ${r.retail.toFixed(2)}</div>`;
    div.onclick = () => openRecipe(r.id);
    el.appendChild(div);
  });
}

// ── OPEN RECIPE ───────────────────────────────────────────────────────────────
function openRecipe(id) {
  currentRecipeId = id;
  view = 'recipe';
  renderSidebar();
  const recipe = state.recipes.find(r => r.id === id);
  if (!recipe) return;
  document.getElementById('topbar-title').textContent = recipe.name;
  document.getElementById('topbar-actions').innerHTML = `
    <button class="btn btn-secondary print-hide" onclick="showIngredients()">⚙ Ingredients</button>
    <button class="btn btn-danger print-hide" onclick="deleteRecipe('${id}')">Delete</button>
    <button class="btn btn-print" onclick="window.print()">🖨 Print</button>`;
  renderRecipeView(recipe);
}

// ── MUTATIONS ─────────────────────────────────────────────────────────────────
function updateIngredient(idx, field, value) {
  const recipe = state.recipes.find(r => r.id === currentRecipeId);
  if (!recipe) return;
  if (field === 'name') {
    const ing = state.ingredients.find(i => i.name === value);
    recipe.items[idx].name = value;
    if (ing) { recipe.items[idx].costPerUnit = ing.cost; recipe.items[idx].unit = ing.unit; }
  } else {
    recipe.items[idx][field] = value;
  }
  saveData();
  renderRecipeView(recipe);
}

function removeIngredient(idx) {
  const recipe = state.recipes.find(r => r.id === currentRecipeId);
  recipe.items.splice(idx, 1);
  saveData();
  renderRecipeView(recipe);
}

function addIngredient() {
  const sel = document.getElementById('add-ing-select');
  const qtyEl = document.getElementById('add-ing-qty');
  const name = sel.value;
  const qty = parseFloat(qtyEl.value) || 0;
  if (!name) return;
  const recipe = state.recipes.find(r => r.id === currentRecipeId);
  const ing = state.ingredients.find(i => i.name === name);
  recipe.items.push({ name, qty, costPerUnit: ing ? ing.cost : 0, unit: ing ? ing.unit : '' });
  saveData();
  sel.value = '';
  qtyEl.value = '';
  renderRecipeView(recipe);
}

function updateMeta(field, value) {
  const recipe = state.recipes.find(r => r.id === currentRecipeId);
  if (!recipe) return;
  recipe[field] = value;
  saveData();
  // Re-render summary only for numeric fields
  if (['portions','wastage','gst','retail'].includes(field)) {
    renderRecipeView(recipe);
  }
}

function applyImageUrl() {
  const url = document.getElementById('img-url-input').value.trim();
  updateMeta('imageUrl', url);
  renderRecipeView(state.recipes.find(r => r.id === currentRecipeId));
}

function deleteRecipe(id) {
  if (!confirm('Delete this recipe?')) return;
  state.recipes = state.recipes.filter(r => r.id !== id);
  saveData();
  currentRecipeId = null;
  document.getElementById('topbar-title').textContent = 'Little Fish Co';
  document.getElementById('topbar-actions').innerHTML = '';
  document.getElementById('content').innerHTML = `<div class="welcome"><img src="${LOGO}" alt="Logo"/><h2>Recipe Costing Tool</h2><p>Select a recipe or create a new one.</p></div>`;
  renderSidebar();
}

function newRecipe() {
  const id = 'recipe_' + Date.now();
  const recipe = { id, name: 'New Recipe', items: [], portions: 1, wastage: 0, gst: 0.15, retail: 0, allergens: '', imageUrl: '', notes: '' };
  state.recipes.push(recipe);
  saveData();
  renderSidebar();
  openRecipe(id);
}

// ── INGREDIENTS MANAGEMENT ────────────────────────────────────────────────────
function showIngredients() {
  currentRecipeId = null;
  view = 'ingredients';
  renderSidebar();
  document.getElementById('topbar-title').textContent = 'Ingredients List';
  document.getElementById('topbar-actions').innerHTML = `
    <button class="btn btn-primary" onclick="addNewIngredient()">+ Add Ingredient</button>`;

  const rows = state.ingredients.map((ing, idx) => `
    <tr>
      <td><input value="${ing.name}" onchange="updateIng(${idx},'name',this.value)"/></td>
      <td><input value="${ing.unit}" onchange="updateIng(${idx},'unit',this.value)"/></td>
      <td><input type="number" value="${ing.cost}" step="0.01" onchange="updateIng(${idx},'cost',+this.value)"/></td>
      <td><input value="${ing.allergen}" onchange="updateIng(${idx},'allergen',this.value)"/></td>
      <td><input value="${ing.dietary}" onchange="updateIng(${idx},'dietary',this.value)"/></td>
      <td><button class="btn-rm" onclick="removeIng(${idx})">×</button></td>
    </tr>`).join('');

  document.getElementById('content').innerHTML = `
    <div class="card ing-mgmt">
      <div class="card-header"><h3>All Ingredients (${state.ingredients.length})</h3></div>
      <div style="overflow-x:auto">
        <table>
          <thead><tr><th>Name</th><th>Unit</th><th>Cost/Unit ($)</th><th>Allergen</th><th>Dietary</th><th></th></tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>
    </div>`;
}

function updateIng(idx, field, value) {
  state.ingredients[idx][field] = value;
  saveData();
}

function removeIng(idx) {
  if (!confirm('Remove this ingredient?')) return;
  state.ingredients.splice(idx, 1);
  saveData();
  showIngredients();
}

function addNewIngredient() {
  state.ingredients.push({ name: 'New Ingredient', unit: 'kg', cost: 0, allergen: '', dietary: '', type: 'Ingredient' });
  saveData();
  showIngredients();
  // scroll to bottom
  setTimeout(() => { document.getElementById('content').scrollTop = 99999; }, 50);
}

// ── INIT ──────────────────────────────────────────────────────────────────────
renderSidebar();
</script>
