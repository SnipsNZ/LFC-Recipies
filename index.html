<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Little Fish Co — Recipe Costing</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --navy:#0d1f3c;
  --ocean:#1a5fa8;
  --teal:#1a8a7e;
  --sand:#f4ede0;
  --cream:#fdf9f4;
  --ink:#161616;
  --mid:#5c6575;
  --light:#8a93a2;
  --faint:#e4ddd2;
  --white:#ffffff;
  --green:#1e6e44;
  --amber:#b87010;
  --red:#b02828;
  --rule:1px solid var(--faint);
}

body{font-family:'Barlow',sans-serif;background:var(--sand);color:var(--ink);min-height:100vh;font-size:14px}

/* ══ LAYOUT ══════════════════════════════════════════════════════════════════ */
.app{display:grid;grid-template-columns:260px 1fr;min-height:100vh}

/* ══ SIDEBAR ════════════════════════════════════════════════════════════════ */
.sidebar{background:var(--navy);color:#fff;display:flex;flex-direction:column;overflow:hidden;position:sticky;top:0;height:100vh}
.sb-brand{padding:1.25rem 1rem .75rem;border-bottom:1px solid rgba(255,255,255,.1);text-align:center}
.sb-brand img{max-width:110px;display:block;margin:0 auto;
  /* Force white rendering - use brightness filter */
  filter:brightness(0) invert(1);
  image-rendering:crisp-edges}
.sb-brand span{display:block;font-family:'Barlow Condensed',sans-serif;font-size:.7rem;letter-spacing:.18em;text-transform:uppercase;color:rgba(255,255,255,.4);margin-top:.4rem}
.sb-new{margin:.75rem;display:block;width:calc(100% - 1.5rem);background:var(--teal);color:#fff;border:none;padding:.6rem;border-radius:5px;font-family:'Barlow',sans-serif;font-weight:600;font-size:.82rem;letter-spacing:.04em;cursor:pointer;transition:background .2s;text-align:center}
.sb-new:hover{background:#148075}
.sb-label{padding:.5rem 1rem .2rem;font-size:.6rem;letter-spacing:.15em;text-transform:uppercase;color:rgba(255,255,255,.35)}
.sb-list{flex:1;overflow-y:auto;padding-bottom:1rem}
.sb-list::-webkit-scrollbar{width:3px}
.sb-list::-webkit-scrollbar-thumb{background:rgba(255,255,255,.15);border-radius:2px}
.sb-item{padding:.55rem 1rem;cursor:pointer;border-left:3px solid transparent;transition:all .15s}
.sb-item:hover{background:rgba(255,255,255,.06)}
.sb-item.active{background:rgba(255,255,255,.1);border-left-color:var(--teal)}
.sb-item-name{font-size:.84rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:500}
.sb-item-meta{font-size:.7rem;color:rgba(255,255,255,.35);margin-top:1px}
.sb-footer{padding:.75rem;border-top:1px solid rgba(255,255,255,.1)}
.sb-mgmt{width:100%;background:rgba(255,255,255,.07);color:rgba(255,255,255,.6);border:none;padding:.5rem;border-radius:4px;font-family:'Barlow',sans-serif;font-size:.78rem;cursor:pointer;transition:background .15s;letter-spacing:.02em}
.sb-mgmt:hover{background:rgba(255,255,255,.12);color:#fff}

/* ══ MAIN ════════════════════════════════════════════════════════════════════ */
.main{display:flex;flex-direction:column;min-height:100vh}
.topbar{background:var(--white);border-bottom:var(--rule);padding:.65rem 1.25rem;display:flex;align-items:center;gap:.75rem;position:sticky;top:0;z-index:10}
.topbar-title{font-family:'Barlow Condensed',sans-serif;font-size:1.2rem;font-weight:700;letter-spacing:.03em;flex:1;text-transform:uppercase}
.btn{padding:.45rem 1rem;border-radius:4px;font-family:'Barlow',sans-serif;font-size:.8rem;font-weight:600;cursor:pointer;border:none;transition:all .15s;letter-spacing:.03em}
.btn-ocean{background:var(--ocean);color:#fff}.btn-ocean:hover{background:#1450900}
.btn-ghost{background:transparent;color:var(--mid);border:1.5px solid var(--faint)}.btn-ghost:hover{border-color:var(--ocean);color:var(--ocean)}
.btn-danger{background:transparent;color:var(--red);border:1.5px solid var(--faint)}.btn-danger:hover{border-color:var(--red)}
.btn-print{background:var(--navy);color:#fff}.btn-print:hover{background:#06132a}

.content{flex:1;overflow-y:auto;padding:1.25rem}

/* ══ WELCOME ════════════════════════════════════════════════════════════════ */
.welcome{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;text-align:center;gap:1rem;padding:2rem}
.welcome img{max-width:140px;opacity:.5}
.welcome h2{font-family:'Barlow Condensed',sans-serif;font-size:1.8rem;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--navy)}
.welcome p{color:var(--mid);max-width:340px;line-height:1.6;font-size:.9rem}

/* ══ RECIPE EDITOR ══════════════════════════════════════════════════════════ */
.recipe-grid{display:grid;grid-template-columns:1fr 300px;gap:1.25rem;align-items:start}

.card{background:var(--white);border-radius:8px;border:var(--rule);overflow:hidden;margin-bottom:1rem}
.card:last-child{margin-bottom:0}
.ch{padding:.75rem 1rem;border-bottom:var(--rule);display:flex;justify-content:space-between;align-items:center;background:var(--cream)}
.ch h3{font-family:'Barlow Condensed',sans-serif;font-size:.85rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--navy)}
.ch span{font-size:.78rem;color:var(--mid)}
.cb{padding:1rem}

/* Image */
.img-frame{width:100%;aspect-ratio:16/7;background:#e8e2d8;overflow:hidden;position:relative;display:flex;align-items:center;justify-content:center}
.img-frame img{width:100%;height:100%;object-fit:cover;display:block}
.img-placeholder{text-align:center;color:var(--light);pointer-events:none}
.img-placeholder svg{opacity:.4;display:block;margin:0 auto .5rem}
.img-placeholder p{font-size:.75rem}
.img-url-row{display:flex;gap:.5rem;padding:.65rem 1rem;background:var(--cream);border-top:var(--rule)}
.img-url-row input{flex:1;border:1.5px solid var(--faint);border-radius:4px;padding:.35rem .6rem;font-size:.8rem;font-family:'Barlow',sans-serif;outline:none;color:var(--ink);background:var(--white)}
.img-url-row input:focus{border-color:var(--ocean)}
.img-url-row .btn{padding:.35rem .75rem;font-size:.76rem}

/* Recipe name field */
.recipe-name-row{padding:.65rem 1rem;border-bottom:var(--rule);background:var(--cream);display:flex;align-items:center;gap:.75rem}
.recipe-name-row label{font-size:.7rem;letter-spacing:.1em;text-transform:uppercase;color:var(--light);white-space:nowrap}
.recipe-name-row input{flex:1;border:none;background:transparent;font-family:'Barlow Condensed',sans-serif;font-size:1.15rem;font-weight:700;letter-spacing:.03em;text-transform:uppercase;color:var(--navy);outline:none}

/* Ingredients table */
.ing-table{width:100%;border-collapse:collapse;font-size:.82rem}
.ing-table th{text-align:left;padding:.4rem .5rem;font-size:.65rem;letter-spacing:.1em;text-transform:uppercase;color:var(--light);border-bottom:2px solid var(--faint);font-weight:600;background:var(--cream)}
.ing-table td{padding:.38rem .5rem;border-bottom:1px solid var(--faint)}
.ing-table tr:last-child td{border-bottom:none}
.ing-table tr:hover td{background:#faf8f5}
.ing-table td input,.ing-table td select{width:100%;border:1.5px solid transparent;border-radius:3px;padding:.2rem .35rem;font-family:'Barlow',sans-serif;font-size:.82rem;background:transparent;color:var(--ink);outline:none}
.ing-table td input:focus,.ing-table td select:focus{border-color:var(--ocean);background:var(--cream)}
.td-cost{color:var(--mid);font-size:.78rem;white-space:nowrap}
.btn-rm{background:none;border:none;color:var(--faint);cursor:pointer;font-size:1rem;padding:0 3px;line-height:1;transition:color .15s}
.btn-rm:hover{color:var(--red)}

.add-row{display:flex;gap:.5rem;padding:.65rem 1rem;background:var(--cream);border-top:var(--rule)}
.add-row select,.add-row input{border:1.5px solid var(--faint);border-radius:4px;padding:.35rem .55rem;font-size:.8rem;font-family:'Barlow',sans-serif;outline:none;color:var(--ink);background:var(--white)}
.add-row select{flex:2}.add-row input{flex:1}
.add-row select:focus,.add-row input:focus{border-color:var(--ocean)}

/* Allergen badges */
.allergen-list{display:flex;flex-wrap:wrap;gap:.3rem;margin-top:.5rem}
.ab{display:inline-block;background:#fff3cd;color:#7a5100;border:1px solid #e8c840;border-radius:3px;padding:.15rem .45rem;font-size:.72rem;font-weight:600;letter-spacing:.03em;text-transform:uppercase}
.ab.fish{background:#ddeeff;color:#1a4a8a;border-color:#a0c4f0}
.ab.dairy{background:#fff0e0;color:#8a4010;border-color:#f0c090}
.ab.egg{background:#fffde0;color:#8a7010;border-color:#e8d840}
.ab.gluten{background:#f0ffe0;color:#2a6a10;border-color:#90d060}
.ab.crustacean{background:#ffe0e0;color:#8a1010;border-color:#f09090}
.ab.mollusc{background:#e8e0ff;color:#3a1a8a;border-color:#a090f0}
.ab.soy{background:#e8f5e8;color:#1a5a1a;border-color:#80c080}
.ab.sesame{background:#f5ece0;color:#6a3a10;border-color:#d0a060}

/* Summary */
.sum-row{display:flex;justify-content:space-between;align-items:center;padding:.42rem 0;border-bottom:1px solid var(--faint)}
.sum-row:last-child{border-bottom:none}
.sum-lbl{font-size:.8rem;color:var(--mid)}
.sum-val{font-size:.85rem;font-weight:600}
.sum-val.hl{color:var(--ocean);font-size:.95rem}
.sum-val.good{color:var(--green)}.sum-val.warn{color:var(--amber)}.sum-val.bad{color:var(--red)}
.sum-input{text-align:right;width:75px;border:1.5px solid var(--faint);border-radius:3px;padding:.2rem .35rem;font-family:'Barlow',sans-serif;font-size:.85rem;font-weight:600;outline:none;color:var(--ink)}
.sum-input:focus{border-color:var(--ocean)}
.sum-divider{border:none;border-top:2px solid var(--navy);margin:.3rem 0}

/* Notes */
.notes-ta{width:100%;border:1.5px solid var(--faint);border-radius:4px;padding:.6rem;font-family:'Barlow',sans-serif;font-size:.82rem;color:var(--ink);resize:vertical;min-height:70px;outline:none;background:var(--white)}
.notes-ta:focus{border-color:var(--ocean)}

/* ══ INGREDIENTS MANAGEMENT ══════════════════════════════════════════════════ */
.mgmt-table{width:100%;border-collapse:collapse;font-size:.8rem}
.mgmt-table th{text-align:left;padding:.4rem .5rem;font-size:.63rem;letter-spacing:.1em;text-transform:uppercase;color:var(--light);border-bottom:2px solid var(--faint);background:var(--cream);font-weight:600}
.mgmt-table td{padding:.35rem .5rem;border-bottom:1px solid var(--faint)}
.mgmt-table td input{width:100%;border:1.5px solid transparent;border-radius:3px;padding:.2rem .35rem;font-family:'Barlow',sans-serif;font-size:.8rem;background:transparent;outline:none}
.mgmt-table td input:focus{border-color:var(--ocean);background:var(--cream)}

/* ══ PRINT ════════════════════════════════════════════════════════════════════
   Target: clean single A4 page, portrait
   ──────────────────────────────────────────────────────────────────────────── */
@media print {
  @page { size: A4 portrait; margin: 12mm 14mm; }

  /* Hide everything except print sheet */
  .sidebar, .topbar, .content > *:not(.print-sheet) { display: none !important; }
  body { background: white; font-size: 11px; }
  .app { display: block; }
  .main { display: block; }
  .content { padding: 0; overflow: visible; }
  .print-sheet { display: block !important; }
}

/* ── Print sheet (hidden on screen, shown on print) ── */
.print-sheet {
  display: none;
  font-family: 'Barlow', sans-serif;
  color: #161616;
  background: white;
}

/* Header bar */
.ps-header {
  display: flex;
  align-items: center;
  gap: 1rem;
  padding-bottom: 6pt;
  border-bottom: 2.5pt solid #0d1f3c;
  margin-bottom: 8pt;
}
.ps-logo { width: 70pt; flex-shrink: 0; }
.ps-logo img { width: 100%; display: block; }
.ps-title-block { flex: 1 }
.ps-company { font-family: 'Barlow Condensed', sans-serif; font-size: 7pt; letter-spacing: .15em; text-transform: uppercase; color: #5c6575; }
.ps-recipe-name { font-family: 'Barlow Condensed', sans-serif; font-size: 22pt; font-weight: 800; text-transform: uppercase; line-height: 1; color: #0d1f3c; }
.ps-meta-pills { display: flex; gap: 6pt; flex-wrap: wrap; margin-top: 3pt; }
.ps-pill { font-size: 7pt; font-weight: 600; letter-spacing: .05em; text-transform: uppercase; padding: 1pt 5pt; border-radius: 2pt; background: #f4ede0; color: #5c6575; border: .5pt solid #e4ddd2; }
.ps-pill.retail { background: #0d1f3c; color: white; }
.ps-pill.fcp.good { background: #d4f0e0; color: #1e6e44; border-color: #80c0a0; }
.ps-pill.fcp.warn { background: #fff0d0; color: #b87010; border-color: #e0c060; }
.ps-pill.fcp.bad  { background: #ffe0e0; color: #b02828; border-color: #e09090; }

/* Image - takes ~top third of content area */
.ps-image {
  width: 100%;
  height: 72mm;
  overflow: hidden;
  border-radius: 3pt;
  margin-bottom: 8pt;
  position: relative;
  background: #e8e2d8;
  display: flex; align-items: center; justify-content: center;
}
.ps-image img { width: 100%; height: 100%; object-fit: cover; display: block; }
.ps-image-none { font-size: 8pt; color: #8a93a2; font-style: italic; }

/* Two-column body */
.ps-body { display: flex; gap: 10pt; }
.ps-left { flex: 1; min-width: 0; }
.ps-right { width: 110pt; flex-shrink: 0; }

/* Section headings */
.ps-section-title {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 7pt;
  font-weight: 700;
  letter-spacing: .15em;
  text-transform: uppercase;
  color: #5c6575;
  border-bottom: 1.5pt solid #0d1f3c;
  padding-bottom: 2pt;
  margin-bottom: 4pt;
}

/* Ingredients table */
.ps-ing-table { width: 100%; border-collapse: collapse; font-size: 8.5pt; }
.ps-ing-table th { text-align: left; padding: 2pt 3pt; font-size: 6.5pt; letter-spacing: .08em; text-transform: uppercase; color: #8a93a2; border-bottom: 1pt solid #e4ddd2; font-weight: 600; }
.ps-ing-table th:last-child, .ps-ing-table td:last-child { text-align: right; }
.ps-ing-table td { padding: 2.5pt 3pt; border-bottom: .5pt solid #f0ebe4; font-size: 8pt; }
.ps-ing-table tr:last-child td { border-bottom: none; }
.ps-ing-table .td-qty { color: #5c6575; white-space: nowrap; }
.ps-ing-table .td-cost { color: #5c6575; }

/* Cost summary */
.ps-sum { width: 100%; }
.ps-sum-row { display: flex; justify-content: space-between; padding: 2pt 0; border-bottom: .5pt solid #f0ebe4; font-size: 8pt; }
.ps-sum-row:last-child { border-bottom: none; }
.ps-sum-row .l { color: #5c6575; }
.ps-sum-row .v { font-weight: 600; }
.ps-sum-row.total-row { border-top: 1.5pt solid #0d1f3c; border-bottom: 1.5pt solid #0d1f3c; margin: 2pt 0; padding: 3pt 0; }
.ps-sum-row.total-row .l { font-weight: 700; color: #0d1f3c; font-size: 8.5pt; }
.ps-sum-row.total-row .v { font-size: 10pt; color: #0d1f3c; }
.ps-sum-row.retail-row .v { color: #1a5fa8; font-size: 9pt; }

/* Allergens */
.ps-allergen-list { display: flex; flex-wrap: wrap; gap: 3pt; margin-top: 4pt; }
.ps-ab { font-size: 6.5pt; font-weight: 700; letter-spacing: .04em; text-transform: uppercase; padding: 1.5pt 4pt; border-radius: 2pt; background: #fff3cd; color: #7a5100; border: .5pt solid #e8c840; }

/* Notes */
.ps-notes { font-size: 8pt; color: #5c6575; line-height: 1.5; margin-top: 4pt; }

/* Footer */
.ps-footer { margin-top: 8pt; padding-top: 5pt; border-top: 1pt solid #e4ddd2; display: flex; justify-content: space-between; align-items: center; }
.ps-footer-brand { font-family: 'Barlow Condensed', sans-serif; font-size: 7pt; letter-spacing: .12em; text-transform: uppercase; color: #8a93a2; }
.ps-footer-date { font-size: 7pt; color: #8a93a2; }
</style>
</head>

// Allergen normalisation map
const ALLERGEN_MAP = {
  'fish':'Fish','fish ':'Fish','fish, gluten':'Fish, Gluten',
  'dairy':'Dairy','egg':'Egg','gluten':'Gluten','gluten ':'Gluten',
  'crustacean':'Crustacean','crustacean\u00a0':'Crustacean',
  'mollusc':'Mollusc','soy':'Soy','sesame':'Sesame',
  'wheat':'Wheat'
};

function normaliseAllergen(s){ return ALLERGEN_MAP[s.trim().toLowerCase()] || s.trim(); }

function loadData(){
  try{
    const ri=localStorage.getItem('lfc_ing'), rr=localStorage.getItem('lfc_rec');
    return {
      ing: ri ? JSON.parse(ri) : JSON.parse(JSON.stringify(BASE_ING)),
      rec: rr ? JSON.parse(rr) : JSON.parse(JSON.stringify(BASE_REC))
    };
  }catch{ return {ing:JSON.parse(JSON.stringify(BASE_ING)), rec:JSON.parse(JSON.stringify(BASE_REC))}; }
}
function save(){
  localStorage.setItem('lfc_ing', JSON.stringify(S.ing));
  localStorage.setItem('lfc_rec', JSON.stringify(S.rec));
}

let S = loadData();
let curId = null;

// ══ CALC ══════════════════════════════════════════════════════════════════════
function calc(r){
  const raw = r.items.reduce((s,it)=>s+(it.qty*it.costPerUnit),0);
  const waste = raw*r.wastage;
  const sub = raw+waste;
  const gstAmt = sub*r.gst;
  const total = sub+gstAmt;
  const por = r.portions>0 ? sub/r.portions : 0;
  const porGst = r.portions>0 ? total/r.portions : 0;
  const fcp = r.retail>0 ? porGst/r.retail : 0;
  return {raw,waste,sub,gstAmt,total,por,porGst,fcp};
}

// Auto-derive allergens from ingredient list
function deriveAllergens(items){
  const set = new Set();
  items.forEach(it=>{
    const ing = S.ing.find(i=>i.name===it.name);
    if(ing && ing.allergen){
      ing.allergen.split(',').forEach(a=>{
        const n=normaliseAllergen(a);
        if(n) set.add(n);
      });
    }
  });
  return Array.from(set).sort().join(', ');
}

// ══ SIDEBAR ══════════════════════════════════════════════════════════════════
function renderSidebar(){
  const el=document.getElementById('sb-list');
  el.innerHTML='';
  S.rec.forEach(r=>{
    const c=calc(r);
    const div=document.createElement('div');
    div.className='sb-item'+(r.id===curId?' active':'');
    div.innerHTML=`<div class="sb-item-name">${r.name}</div>
      <div class="sb-item-meta">Portion $${c.porGst.toFixed(2)} incl. GST &nbsp;·&nbsp; Retail $${r.retail.toFixed(2)}</div>`;
    div.onclick=()=>openRecipe(r.id);
    el.appendChild(div);
  });
}

function openRecipe(id){
  curId=id;

}

          <div class="ps-sum-row total-row"><span class="l">Portion cost (excl. GST)</span><span class="v">$${c.por.toFixed(2)}</span></div>
          <div class="ps-sum-row total-row"><span class="l">Portion cost (incl. GST)</span><span class="v">$${c.porGst.toFixed(2)}</span></div>
          <div class="ps-sum-row retail-row" style="margin-top:4pt"><span class="l" style="font-weight:700">Retail Price</span><span class="v" style="color:#1a5fa8;font-size:11pt">$${r.retail.toFixed(2)}</span></div>
          <div class="ps-sum-row"><span class="l">Food cost %</span><span class="v" style="color:${c.fcp<0.28?'#1e6e44':c.fcp<0.35?'#b87010':'#b02828'}">${(c.fcp*100).toFixed(1)}%</span></div>
        </div>
      </div>
    </div>

    <!-- Footer -->
    <div class="ps-footer">
      <span class="ps-footer-brand">Little Fish Co · Recipe Costing</span>
      <span class="ps-footer-date">Printed ${date}</span>
    </div>
  </div>`;
}

function doPrint(){
  // Rebuild print sheet with fresh data before printing
  const r=S.rec.find(x=>x.id===curId);
  if(!r) return;
  const c=calc(r);
  const allergenStr=deriveAllergens(r.items);
  const ps=document.getElementById('print-sheet');
  if(ps) ps.outerHTML=buildPrintSheet(r,c,allergenStr);
  window.print();
}

// ══ MUTATIONS ════════════════════════════════════════════════════════════════
function updIng(idx,field,value){
  const r=S.rec.find(x=>x.id===curId); if(!r) return;
  if(field==='name'){
    const ing=S.ing.find(i=>i.name===value);
    r.items[idx].name=value;
    if(ing){r.items[idx].costPerUnit=ing.cost; r.items[idx].unit=ing.unit;}
  } else { r.items[idx][field]=value; }
  // Auto-update allergens
  r.allergens=deriveAllergens(r.items);
  save(); renderEditor(r);
}

function rmIng(idx){
  const r=S.rec.find(x=>x.id===curId); if(!r) return;
  r.items.splice(idx,1);
  r.allergens=deriveAllergens(r.items);
  save(); renderEditor(r);
}

function addIng(){
  const sel=document.getElementById('add-sel');
  const qty=parseFloat(document.getElementById('add-qty').value)||0;
  if(!sel.value) return;
  const r=S.rec.find(x=>x.id===curId); if(!r) return;
  const ing=S.ing.find(i=>i.name===sel.value);
  r.items.push({name:sel.value, qty, costPerUnit:ing?ing.cost:0, unit:ing?ing.unit:''});
  r.allergens=deriveAllergens(r.items);
  save(); sel.value=''; document.getElementById('add-qty').value='';
  renderEditor(r);
}

function updMeta(field,value){
  const r=S.rec.find(x=>x.id===curId); if(!r) return;
  r[field]=value;
  save();
  if(['portions','wastage','gst','retail'].includes(field)) renderEditor(r);
  if(field==='name') document.getElementById('topbar-title').textContent=value;
}

function applyImg(){
  const url=document.getElementById('img-input').value.trim();
  updMeta('imageUrl',url);
  renderEditor(S.rec.find(x=>x.id===curId));
}

function deleteRecipe(id){
  if(!confirm('Delete this recipe?')) return;
  S.rec=S.rec.filter(r=>r.id!==id);
  save(); curId=null;
  document.getElementById('topbar-title').textContent='Little Fish Co';
  document.getElementById('topbar-actions').innerHTML='';
  document.getElementById('content').innerHTML=`<div class="welcome"><img src="${LOGO}" alt="Logo" style="filter:opacity(.4)"/><h2>Recipe Costing</h2><p>Select a recipe or create a new one.</p></div>`;
  renderSidebar();
}

function newRecipe(){
  const id='rec_'+Date.now();
  S.rec.push({id,name:'New Recipe',items:[],portions:1,wastage:0,gst:0.15,retail:0,allergens:'',imageUrl:'',notes:''});
  save(); renderSidebar(); openRecipe(id);
}

// ══ INGREDIENTS MANAGEMENT ════════════════════════════════════════════════════
function showIngredients(){
  curId=null; renderSidebar();
  document.getElementById('topbar-title').textContent='Ingredients';
  document.getElementById('topbar-actions').innerHTML=`<button class="btn btn-ocean" onclick="addIngredient()">+ Add</button>`;

  const rows=S.ing.map((ing,idx)=>`
    <tr>
      <td><input value="${esc(ing.name)}" onchange="updIngredient(${idx},'name',this.value)"/></td>
      <td><input value="${esc(ing.unit)}" onchange="updIngredient(${idx},'unit',this.value)"/></td>
      <td><input type="number" value="${ing.cost}" step="0.01" onchange="updIngredient(${idx},'cost',+this.value)"/></td>
      <td><input value="${esc(ing.allergen)}" onchange="updIngredient(${idx},'allergen',this.value)"/></td>
      <td><input value="${esc(ing.dietary)}" onchange="updIngredient(${idx},'dietary',this.value)"/></td>
      <td><button class="btn-rm" onclick="removeIngredient(${idx})">×</button></td>
    </tr>`).join('');

  document.getElementById('content').innerHTML=`
    <div class="card">
      <div class="ch"><h3>All Ingredients (${S.ing.length})</h3></div>
      <div style="overflow-x:auto">
        <table class="mgmt-table">
          <thead><tr><th>Name</th><th>Unit</th><th>$/Unit</th><th>Allergen</th><th>Dietary</th><th></th></tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>
    </div>`;
}

function updIngredient(idx,field,value){S.ing[idx][field]=value; save();}
function removeIngredient(idx){if(!confirm('Remove?')) return; S.ing.splice(idx,1); save(); showIngredients();}
function addIngredient(){S.ing.push({name:'New Ingredient',unit:'kg',cost:0,allergen:'',dietary:'',type:'Ingredient'}); save(); showIngredients(); setTimeout(()=>document.getElementById('content').scrollTop=99999,50);}

// ══ UTILS ════════════════════════════════════════════════════════════════════
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function allergenClass(a){
  const m={'fish':'fish','dairy':'dairy','egg':'egg','gluten':'gluten','wheat':'gluten','crustacean':'crustacean','mollusc':'mollusc','soy':'soy','sesame':'sesame'};
  return m[a.toLowerCase().trim()]||'';
}

// ══ INIT ══════════════════════════════════════════════════════════════════════
renderSidebar();
</script>
</body>
</html>
